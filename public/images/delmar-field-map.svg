<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1a3a1a"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Del Mar Field Map</text>

  <!-- Field grid - 2x2 layout -->
  <!-- Field 1 (top-left) -->
  <rect x="60" y="70" width="320" height="230" rx="4" fill="#2d5a2d" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="80" y="90" width="280" height="190" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="220" y1="90" x2="220" y2="280" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="220" cy="185" r="30" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="80" y="145" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="320" y="145" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="220" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff6a">Field 1</text>

  <!-- Field 2 (top-right) -->
  <rect x="420" y="70" width="320" height="230" rx="4" fill="#2d5a2d" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="440" y="90" width="280" height="190" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="580" y1="90" x2="580" y2="280" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="580" cy="185" r="30" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="440" y="145" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="680" y="145" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="580" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff6a">Field 2</text>

  <!-- Field 3 (bottom-left) -->
  <rect x="60" y="330" width="320" height="230" rx="4" fill="#2d5a2d" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="80" y="350" width="280" height="190" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="220" y1="350" x2="220" y2="540" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="220" cy="445" r="30" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="80" y="405" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="320" y="405" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="220" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff6a">Field 3</text>

  <!-- Field 4 (bottom-right) -->
  <rect x="420" y="330" width="320" height="230" rx="4" fill="#2d5a2d" stroke="#4a8a4a" stroke-width="2"/>
  <rect x="440" y="350" width="280" height="190" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="580" y1="350" x2="580" y2="540" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="580" cy="445" r="30" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="440" y="405" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <rect x="680" y="405" width="40" height="80" rx="2" fill="none" stroke="#ffffff" stroke-width="1"/>
  <text x="580" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff6a">Field 4</text>

  <!-- Parking indicator -->
  <rect x="340" y="575" width="120" height="20" rx="4" fill="#333333" stroke="#ffd700" stroke-width="1"/>
  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd700">PARKING</text>
</svg>
